<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Profile Update | Practical Zone</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #0b0f19;
            --card-bg: rgba(20, 27, 45, 0.7);
            --primary: #38bdf8;
            --primary-glow: rgba(56, 189, 248, 0.15);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background-image: radial-gradient(at 100% 0%, rgba(56, 189, 248, 0.08) 0px, transparent 50%);
        }

        .edit-container {
            width: 100%;
            max-width: 520px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 35px 30px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .edit-container h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
            color: #fff;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 15px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 16px 14px 45px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }

        .input-wrapper input:focus {
            border-color: var(--primary);
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 0 4px var(--primary-glow);
        }

        /* Compulsory Badge */
        .compulsory-badge {
            color: #ef4444;
            font-size: 11px;
            font-weight: 600;
            margin-left: 5px;
        }

        /* Divider for changes */
        .form-divider {
            height: 1px;
            background: var(--border);
            margin: 30px 0 25px 0;
            position: relative;
        }
        .form-divider span {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #141b2d;
            padding: 0 12px;
            font-size: 11px;
            color: var(--primary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary), #818cf8);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 25px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(56, 189, 248, 0.2);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s;
        }
        .back-link:hover {
            color: var(--primary);
        }
    </style>
</head>
<body>

    <div class="edit-container">
        <h2>Request Profile Update</h2>
        <p class="subtitle">Enter your compulsory PRN number and your new details to request admin approval.</p>
        
        <form id="updateRequestForm" onsubmit="submitUpdateRequest(event)">
            
            <div class="form-group">
                <label for="studentPRN">PRN Number <span class="compulsory-badge">(Required / अनिवार्य)*</span></label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-id-card"></i>
                    <input type="text" id="studentPRN" placeholder="Enter your registered PRN number" required>
                </div>
            </div>

            <div class="form-divider">
                <span>New Details to Update</span>
            </div>

            <div class="form-group">
                <label for="newName">New Full Name</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="newName" placeholder="Enter new full name">
                </div>
            </div>

            <div class="form-group">
                <label for="newEmail">New Email ID</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="newEmail" placeholder="Enter new email address">
                </div>
            </div>

            <div class="form-group">
                <label for="newPhone">New Mobile Number</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-phone"></i>
                    <input type="tel" id="newPhone" placeholder="Enter new 10-digit mobile number" pattern="[0-9]{10}">
                </div>
            </div>

            <div class="form-group">
                <label for="newPassword">New Password</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="newPassword" placeholder="Enter new password">
                </div>
            </div>

            <button type="submit" class="submit-btn">
                <i class="fa-solid fa-paper-plane"></i> Submit Request to Admin
            </button>
        </form>

        <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // 🔐 YOUR LIVE FIREBASE CONFIGURATION BOX CONNECTED SUCCESSFULLY
        const firebaseConfig = {
            apiKey: "AIzaSyCZhDPaVY7jv_hXtHdpVqUcGe1hwAxvZmc",
            authDomain: "students-e5183.firebaseapp.com",
            databaseURL: "https://students-e5183-default-rtdb.firebaseio.com",
            projectId: "students-e5183",
            storageBucket: "students-e5183.firebasestorage.app",
            messagingSenderId: "473442117683",
            appId: "1:473442117683:web:f39adc0665317aa95e9b46",
            measurementId: "G-DT4XQLZJW3"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Function to push edit requests to Firebase
        function submitUpdateRequest(event) {
            event.preventDefault();

            const prn = document.getElementById('studentPRN').value.trim();
            const newName = document.getElementById('newName').value.trim();
            const newEmail = document.getElementById('newEmail').value.trim();
            const newPhone = document.getElementById('newPhone').value.trim();
            const newPassword = document.getElementById('newPassword').value.trim();

            // Strict Validation: If PRN is missing, form will stop and show alert
            if (!prn) {
                alert("Error: PRN Number is strictly required to process any update request!");
                return;
            }

            // Check if at least one field is being updated
            if (!newName && !newEmail && !newPhone && !newPassword) {
                alert("Please fill at least one field that you want to update.");
                return;
            }

            // 1. Fetch current active data from 'users' node to fetch student's old records
            database.ref('users/' + prn).once('value').then((snapshot) => {
                const userData = snapshot.val();
                
                // Fallback values if old records don't exist yet
                const oldName = userData ? userData.name : "Not Available";
                const oldEmail = userData ? userData.email : "Not Available";
                const oldPhone = userData ? userData.phone : "Not Available";
                const oldPassword = userData ? userData.password : "Not Available";

                // 2. Push the structured data into 'profile_requests' box under their specific PRN
                database.ref('profile_requests/' + prn).set({
                    prn: prn,
                    // If user didn't fill a new field, keep it empty or copy old one so admin knows
                    oldName: oldName,
                    newName: newName || oldName,
                    
                    oldEmail: oldEmail,
                    newEmail: newEmail || oldEmail,
                    
                    oldPhone: oldPhone,
                    newPhone: newPhone || oldPhone,

                    oldPassword: oldPassword,
                    newPassword: newPassword || oldPassword,
                    
                    status: "pending" // Flag for Admin Approval Panel
                }).then(() => {
                    alert("Your profile update request has been submitted successfully to Admin!");
                    document.getElementById('updateRequestForm').reset();
                    window.location.href = "index.html";
                }).catch((error) => {
                    console.error("Firebase Error: ", error);
                    alert("Something went wrong! Please try again later.");
                });
            });
        }
    </script>
</body>
</html>
